name: Create Android Production Build
on:
  workflow_dispatch:
    inputs:
      submit:
        description: 'Submit to Google Play'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🚀 Build AAB Local
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          # We use --local to avoid EAS Cloud limits. 
          eas build --platform android --profile production --local --non-interactive --output=app-release.aab

      - name: 📦 Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: app-release.aab
          retention-days: 7
